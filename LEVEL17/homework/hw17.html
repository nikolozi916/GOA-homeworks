<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- b tag-გამოიყენება იმისთვის რომ სიტყვა სქელი გახდეს. -->
    <!-- u tag-tag-ის მეშვეობით ჩვენ საიტზე ვამატებთ ისეთ ტექსტს რომელსაც დაბლა ხაზი აქვს გასმული. -->
    <!-- i tag--გამოიყენება იმისთვის რომ სიტყვა სქელი გახდეს. -->
    <!-- სემატიკური თეგი არის html-ში ისეთი თეგი რომელიც თავის სახელითვე აღწერს სიგნით არსებულ კონტენტს. -->
    <!-- განსხვავება ის არის რომ em tag არის სემატიკური თეგი ხოლო i თეგი არ არის სემატიკური. -->
    <!-- განსხვავება ასევე ის არის რომ strong თეგი არის სემატიკური თეგი ხოლო b თეგი არ არის სემატიკური თეგი. -->
    <b>helo</b>
    <i>hi</i>
    <u>1234555</u>
</body>
</html>
