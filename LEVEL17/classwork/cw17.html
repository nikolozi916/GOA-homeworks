<body>
    <!-- b tag-გამოიყენება იმისთვის რომ სიტყვა სქელი გახდეს. -->

    <!-- u tag-ის მეშვეობით ჩვენ საიტზე ვამატებთ ისეთ ტექსტს რომელსაც დაბლა ხაზი აქვს გასმული. -->
